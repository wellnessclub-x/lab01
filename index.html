<style>
body { font-family: sans-serif; background-color: #f0f9ff; color: #333; margin: 0; padding: 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; min-height: 100vh; user-select: none; -webkit-user-select: none; touch-action: pan-y; }
#app-wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
h1 { font-size: 20px; color: #12658D; margin-bottom: 10px; text-align: center; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 20px; text-align: center; font-weight: bold; }
#muscle-img-wrapper { width: 100%; max-width: 400px; margin-bottom: 15px; display: none; }
#muscle-img { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background-color: #fff; pointer-events: none; }
#quiz-container { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
.question { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; line-height: 1.4; color: #12658D; pointer-events: none; }
#furigana-container { display: none; font-size: 16px; color: #888; margin-bottom: 10px; text-align: center; line-height: 1.2; pointer-events: none; }
#answer-container { display: none; font-size: 28px; font-weight: bold; color: #ef4444; margin-bottom: 20px; text-align: center; line-height: 1.4; pointer-events: none; }
.btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
.btn:active { opacity: 0.8; }
#result-screen, #logo-container { display: none; text-align: center; }
#start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; }
#quiz-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 250px; cursor: pointer; }
.tap-guide { font-size: 13px; color: #aaa; margin-top: 30px; text-align: center; pointer-events: none; }
#logo-container { margin-top: 20px; text-align: center; width: 100%; pointer-events: none; }
#logo-container img { max-width: 150px; height: auto; opacity: 0.8; }
.start-logo { max-width: 200px; height: auto; margin-bottom: 20px; }
#progress-text { font-size: 14px; color: #666; text-align: right; width: 100%; margin-bottom: 15px; font-weight: bold; pointer-events: none; }
</style>

let currentQuestionIndex = 0;
let isShowingAnswer = false;

document.getElementById("start-btn").addEventListener("click", function(e) {
e.stopPropagation();
document.getElementById("start-screen").style.display = "none";
document.getElementById("quiz-screen").style.display = "flex";
document.getElementById("logo-container").style.display = "block";
currentQuestionIndex = 0;
loadQuestion();
});

document.getElementById("reset-btn").addEventListener("click", function(e) {
e.stopPropagation();
document.getElementById("result-screen").style.display = "none";
document.getElementById("start-screen").style.display = "flex";
});

let touchStartX = 0;
let touchEndX = 0;
let isSwiping = false;

document.addEventListener("touchstart", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
touchStartX = e.changedTouches[0].screenX;
isSwiping = false;
}, {passive: true});

document.addEventListener("touchend", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
touchEndX = e.changedTouches[0].screenX;
const threshold = 50;

if (touchEndX < touchStartX - threshold) {
isSwiping = true;
advanceState();
} else if (touchEndX > touchStartX + threshold) {
isSwiping = true;
goBackState();
}
}, {passive: true});

document.addEventListener("click", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
if (isSwiping) return;
advanceState();
});

function advanceState() {
if (!isShowingAnswer) {
showAnswer();
} else {
if (currentQuestionIndex < quizData.length - 1) {
currentQuestionIndex++;
loadQuestion();
} else {
showResult();
}
}
}

function goBackState() {
if (isShowingAnswer) {
loadQuestion();
} else if (currentQuestionIndex > 0) {
currentQuestionIndex--;
loadQuestion();
}
}

function loadQuestion() {
isShowingAnswer = false;
const currentQuiz = quizData[currentQuestionIndex];
document.getElementById("progress-text").textContent = (currentQuestionIndex + 1) + " / " + quizData.length + " 問目";
document.getElementById("question-text").textContent = "Q" + (currentQuestionIndex + 1) + ". " + currentQuiz.question;

document.getElementById("furigana-container").style.display = "none";
document.getElementById("answer-container").style.display = "none";

const muscleImg = document.getElementById("muscle-img");
if (currentQuiz.image) {
muscleImg.src = currentQuiz.image;
muscleImg.style.display = "block";
document.getElementById("muscle-img-wrapper").style.display = "block";
} else {
document.getElementById("muscle-img-wrapper").style.display = "none";
}
}

function showAnswer() {
isShowingAnswer = true;
const currentQuiz = quizData[currentQuestionIndex];

const furiganaContainer = document.getElementById("furigana-container");
if (currentQuiz.furigana) {
furiganaContainer.textContent = currentQuiz.furigana;
furiganaContainer.style.display = "block";
}

const answerContainer = document.getElementById("answer-container");
answerContainer.textContent = currentQuiz.answer;
answerContainer.style.display = "block";
}

function showResult() {
document.getElementById("quiz-screen").style.display = "none";
document.getElementById("logo-container").style.display = "none";
document.getElementById("muscle-img-wrapper").style.display = "none";
document.getElementById("result-screen").style.display = "block";
}
</script>

</html>
