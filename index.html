<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関節の動き・筋肉学習アプリ</title>
<style>
body { font-family: sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; text-align: center; }
h1 { font-size: 20px; color: #0056b3; }
#quiz-container { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; position: relative; }
.question { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
.btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; background-color: #e2e8f0; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
.btn:active { background-color: #cbd5e1; }
#result { font-size: 20px; font-weight: bold; margin-top: 20px; display: none; }

/* ポップアップのスタイル */
#popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(255,255,255,0.95); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); font-size: 24px; font-weight: bold; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 1000; width: 80%; max-width: 300px; }
#popup.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
.correct-text { color: #10b981; }
.incorrect-text { color: #ef4444; }
.answer-text { font-size: 16px; color: #333; margin-top: 10px; display: block; font-weight: normal; }
</style>

</head>
<body>
<div id="quiz-container">
<h1>関節の動き・筋肉学習アプリ</h1>
<div id="question-text" class="question"></div>
<div id="choices-container"></div>
<div id="result"></div>
</div>

<div id="popup"></div>

<script>
const quizData = [
{ question: "肩関節の「屈曲」において、貢献度1位の筋肉は？", choices: ["広背筋", "三角筋(前部)", "大胸筋(上部)", "棘上筋"], answer: "三角筋(前部)" },
{ question: "肘関節の「伸展」において、貢献度1位の筋肉は？", choices: ["上腕二頭筋", "上腕筋", "上腕三頭筋", "肘筋"], answer: "上腕三頭筋" },
{ question: "股関節の「屈曲」において、貢献度1位の筋肉は？", choices: ["大殿筋", "ハムストリングス", "中殿筋", "腸腰筋"], answer: "腸腰筋" },
{ question: "膝関節の「屈曲」において、貢献度1位の筋肉は？", choices: ["ハムストリングス", "大腿四頭筋", "腓腹筋", "大殿筋"], answer: "ハムストリングス" },
{ question: "肩関節の「外転」において、貢献度2位の筋肉は？", choices: ["三角筋(中部)", "棘上筋", "大円筋", "広背筋"], answer: "棘上筋" }
];

let currentQuestionIndex = 0;
let score = 0;
let isAnimating = false;

const questionText = document.getElementById("question-text");
const choicesContainer = document.getElementById("choices-container");
const resultElement = document.getElementById("result");
const popup = document.getElementById("popup");

function loadQuestion() {
isAnimating = false;
const currentQuiz = quizData[currentQuestionIndex];
questionText.textContent = currentQuiz.question;
choicesContainer.innerHTML = "";

currentQuiz.choices.forEach(choice => {
const button = document.createElement("button");
button.textContent = choice;
button.classList.add("btn");
button.onclick = () => checkAnswer(choice);
choicesContainer.appendChild(button);
});
}

function checkAnswer(selectedChoice) {
if (isAnimating) return;
isAnimating = true;

const currentQuiz = quizData[currentQuestionIndex];
const isCorrect = selectedChoice === currentQuiz.answer;

if (isCorrect) {
score++;
popup.innerHTML = "<div class='correct-text'>○ 正解！</div>";
} else {
popup.innerHTML = "<div class='incorrect-text'>× 不正解...</div><span class='answer-text'>正解は「" + currentQuiz.answer + "」</span>";
}

popup.classList.add("show");

setTimeout(() => {
popup.classList.remove("show");
currentQuestionIndex++;
if (currentQuestionIndex < quizData.length) {
setTimeout(loadQuestion, 300);
} else {
setTimeout(showResult, 300);
}
}, 1200);
}

function showResult() {
questionText.style.display = "none";
choicesContainer.style.display = "none";
resultElement.style.display = "block";
resultElement.textContent = "お疲れ様でした！ 5問中 " + score + " 問正解です。";
}

loadQuestion();
</script>

</body>
</html>
