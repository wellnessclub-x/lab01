<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関節の動き・筋肉学習アプリ</title>
<style>
body { font-family: sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
#app-wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
h1 { font-size: 20px; color: #0056b3; margin-bottom: 10px; text-align: center; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 20px; text-align: center; }
#quiz-container { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
.question { font-size: 18px; font-weight: bold; margin-bottom: 20px; text-align: center; }
.btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; background-color: #e2e8f0; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
.btn:active { background-color: #cbd5e1; }
.btn.selected { background-color: #bae6fd; border: 2px solid #0284c7; }
.nav-container { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
.nav-btn { flex: 1; padding: 12px; background-color: #0056b3; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: 0.2s; }
.nav-btn:active { background-color: #004494; }
.nav-btn:disabled { background-color: #cbd5e1; cursor: not-allowed; }
#result-screen, #quiz-screen, #logo-container { display: none; text-align: center; }
#start-screen { display: block; text-align: center; }
#popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(255,255,255,0.95); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); font-size: 24px; font-weight: bold; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 1000; width: 80%; max-width: 300px; text-align: center; }
#popup.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
.correct-text { color: #10b981; }
.incorrect-text { color: #ef4444; }
.answer-text { font-size: 16px; color: #333; margin-top: 10px; display: block; font-weight: normal; }
#logo-container { margin-top: 20px; text-align: center; width: 100%; }
#logo-container img { max-width: 150px; height: auto; opacity: 0.8; }
.start-logo { max-width: 200px; height: auto; margin-bottom: 20px; }
</style>
</head>
<body>

<div id="app-wrapper">
<div id="quiz-container">

<div id="start-screen">
<img src="logo.png" alt="ロゴ" class="start-logo" id="start-logo-img">
<h1>関節の動き・筋肉学習アプリ</h1>
<p class="subtitle">カラダかわる。ココロおどる。</p>
<button id="start-btn" class="btn">学習をスタートする</button>
</div>

<div id="quiz-screen">
<h1>関節の動き・筋肉学習アプリ</h1>
<div id="question-text" class="question"></div>
<div id="choices-container"></div>
<div class="nav-container">
<button id="prev-btn" class="nav-btn">前の問題</button>
<button id="next-btn" class="nav-btn">次の問題</button>
</div>
</div>

<div id="result-screen">
<h1>学習完了</h1>
<div id="result-text" style="font-size: 20px; font-weight: bold; margin-top: 20px;"></div>
<button id="reset-btn" class="btn" style="margin-top: 30px;">最初からやり直す</button>
</div>

</div>
<div id="logo-container">
<img src="logo.png" alt="ロゴ" id="footer-logo-img">
</div>
</div>

<div id="popup"></div>

];

let currentQuestionIndex = 0;
let userAnswers = [];
let isAnimating = false;

document.getElementById("start-btn").addEventListener("click", function() {
document.getElementById("start-screen").style.display = "none";
document.getElementById("quiz-screen").style.display = "block";
document.getElementById("logo-container").style.display = "block";
currentQuestionIndex = 0;
userAnswers = new Array(quizData.length).fill(null);
isAnimating = false;
loadQuestion();
});

document.getElementById("prev-btn").addEventListener("click", function() {
if (isAnimating || currentQuestionIndex === 0) return;
currentQuestionIndex--;
loadQuestion();
});

document.getElementById("next-btn").addEventListener("click", function() {
if (isAnimating) return;
if (currentQuestionIndex < quizData.length - 1) {
currentQuestionIndex++;
loadQuestion();
} else {
showResult();
}
});

document.getElementById("reset-btn").addEventListener("click", function() {
document.getElementById("result-screen").style.display = "none";
document.getElementById("start-screen").style.display = "block";
isAnimating = false;
});

function loadQuestion() {
const currentQuiz = quizData[currentQuestionIndex];
document.getElementById("question-text").textContent = "Q" + (currentQuestionIndex + 1) + ". " + currentQuiz.question;
const choicesContainer = document.getElementById("choices-container");
choicesContainer.innerHTML = "";

currentQuiz.choices.forEach(function(choice) {
const button = document.createElement("button");
button.textContent = choice;
button.className = "btn";
if (userAnswers[currentQuestionIndex] === choice) {
button.classList.add("selected");
}
button.addEventListener("click", function() { checkAnswer(choice); });
choicesContainer.appendChild(button);
});

document.getElementById("prev-btn").disabled = (currentQuestionIndex === 0);
if (currentQuestionIndex === quizData.length - 1) {
document.getElementById("next-btn").textContent = "結果を見る";
} else {
document.getElementById("next-btn").textContent = "次の問題";
}
}

function checkAnswer(selectedChoice) {
if (isAnimating) return;
isAnimating = true;
userAnswers[currentQuestionIndex] = selectedChoice;
const currentQuiz = quizData[currentQuestionIndex];
const isCorrect = (selectedChoice === currentQuiz.answer);
const popup = document.getElementById("popup");

if (isCorrect) {
popup.innerHTML = "<div class='correct-text'>○ 正解！</div>";
} else {
popup.innerHTML = "<div class='incorrect-text'>× 不正解...</div><span class='answer-text'>正解は「" + currentQuiz.answer + "」</span>";
}

popup.classList.add("show");
loadQuestion();

setTimeout(function() {
popup.classList.remove("show");
if (currentQuestionIndex < quizData.length - 1) {
currentQuestionIndex++;
loadQuestion();
} else {
showResult();
}
isAnimating = false;
}, 1200);
}

function showResult() {
document.getElementById("quiz-screen").style.display = "none";
document.getElementById("logo-container").style.display = "none";
document.getElementById("result-screen").style.display = "block";
let score = 0;
userAnswers.forEach(function(ans, index) {
if (ans === quizData[index].answer) score++;
});
document.getElementById("result-text").textContent = quizData.length + "問中 " + score + " 問正解です！";
}
</script>
